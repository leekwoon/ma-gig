defaults:
  - _self_
  - dataset: oxfordpet
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

explainer_name: eig
save_dir: null
seed: 0
device: cuda

# classifier
model_name: resnet18

# explainer
num_steps: 200
baseline_method: zero
exp_obj: prob

# VAE settings
vae_type: sd2  # sd1, sd2, mar, kd

# evaluation
max_eval_samples: 500  # Maximum number of samples to evaluate (null for all)
num_vis_samples: 10    # Number of samples to visualize

# hydra
hydra:
  run:
    dir: .
  output_subdir: null
