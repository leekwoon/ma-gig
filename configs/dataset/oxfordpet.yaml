dataset_name: oxfordpet
# Set this to the directory containing Oxford-IIIT Pet images
# (the folder that holds the .jpg files; typically `<dataset_root>/images`).
dataset_path: /path/to/oxfordpet/images
test_split: 0.05
image_size: 256
batch_size: 1
num_workers: 4
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
random_flip: false
num_classes: 37
